<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Liver Care - Early Detection{% endblock %}</title>
  <meta name="author" content="Liver Care">
  <meta name="description" content="{% block description %}Liver Care - Medical HTML Template{% endblock %}">

  <link rel="icon" type="image/png" href="../static/ico/favicon.png">
  <link rel="shortcut icon" href="../static/ico/favicon.png">
  
  <link rel="apple-touch-icon" sizes="57x57" href="../static/ico/apple-touch-icon-57-precomposed.png">
  
  <link rel="icon" type="image/png" href="../static/ico/favicon.png?v=20241220">
  <link rel="shortcut icon" href="../static/ico/favicon.png?v=20241220">
  
  <!-- Fallback emoji (shows if image fails) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231B3C53'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='%230ea5e9' font-family='Arial'%3E🫀%3C/text%3E%3C/svg%3E">

  <!-- CSS -->
  <link href="{{ url_for('static', filename='css/ionicons.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/shared.css') }}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  
  {% block extra_css %}{% endblock %}
</head>

<body>

<!-- Header Container -->
{% include 'components/header.html' %}

<!-- Main Content -->
{% block content %}
{% endblock %}

<!-- Footer Container -->
{% include 'components/footer.html' %}

<!-- Scripts -->
<script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/components/header.js') }}"></script>
<script src="{{ url_for('static', filename='js/components/footer.js') }}"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
